<!DOCTYPE html>
<html lang="en">

<head>

    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <!-- Blazorise (Bootstrap5 provider + FontAwesome icons) -->
    <link rel="stylesheet" href="_content/Blazorise/blazorise.css" />
    <link rel="stylesheet" href="_content/Blazorise.Bootstrap5/blazorise.bootstrap5.css" />
    <link rel="stylesheet" href="_content/Blazorise.Icons.FontAwesome/v6/css/all.min.css" />

    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>

    <!-- Bit.Besql JS (plain global script defining window.BitBesql). Must load before Blazor

    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
